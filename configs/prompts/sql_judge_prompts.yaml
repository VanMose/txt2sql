# SQL Judge Prompts
# Version: Select via settings.sql_judge_prompt_version
#
# DESIGN PRINCIPLES:
# - Universal evaluation criteria
# - Schema-aware for validation
# - Case-sensitive table/column checking
# - Clear scoring rubric

v1:
  description: "Basic SQL quality evaluator with schema validation - Universal"
  template: |
    You are an expert SQL query evaluator.

    ## Task
    Evaluate whether the SQL query correctly answers the user's question.

    ## Database Schema
    {schema}

    ## Question
    {query}

    ## SQL Query
    {sql}

    ## Evaluation Criteria

    1. **Table Names (CASE-SENSITIVE)**: Do table names match the schema EXACTLY?
       - `Movie` ≠ `movie` ≠ `MOVIE` - must match schema exactly

    2. **Column Names (CASE-SENSITIVE)**: Do column names match the schema EXACTLY?
       - `Rating` ≠ `rating` ≠ `RATING` - must match schema exactly

    3. **SELECT Columns**: Does the SELECT clause return what the question asks for?

    4. **Filter Correctness**: Are WHERE conditions correct (not hallucinated)?

    5. **Syntax**: Is the SQL syntactically valid?

    ## Scoring Guidelines

    | Score | Meaning |
    |-------|---------|
    | 0.9-1.0 | Perfect - all names match schema exactly, query answers question |
    | 0.7-0.89 | Good - minor issues but table/column names are correct |
    | 0.5-0.69 | Acceptable - some name mismatches (case errors) |
    | 0.3-0.49 | Poor - significant case mismatches or wrong tables |
    | 0.0-0.29 | Wrong - completely wrong table/column names |

    ## Output Format
    Return a JSON object:
    {{
      "confidence": 0.0-1.0,
      "error": false,
      "reason": "explanation mentioning any case mismatches found"
    }}

    ## Your Evaluation (JSON only):

v2:
  description: "Enhanced SQL evaluator with schema-aware case-sensitive validation - Universal"
  template: |
    You are an expert SQL query reviewer with years of experience.

    ## Task
    Critically evaluate whether the SQL query correctly answers the user's question.

    ## Database Schema
    {schema}

    ## Question
    {query}

    ## SQL Query
    {sql}

    ## Evaluation Checklist

    ### 1. Table Name Validation (CRITICAL - CASE-SENSITIVE!)
    - [ ] Extract all table names from the SQL query
    - [ ] Compare each table name against the schema ABOVE
    - [ ] Verify EXACT match including capitalization: `Movie` ≠ `movie`
    - [ ] Flag any case mismatches as errors

    ### 2. Column Name Validation (CRITICAL - CASE-SENSITIVE!)
    - [ ] Extract all column names from the SQL query
    - [ ] Compare each column name against the schema ABOVE
    - [ ] Verify EXACT match including capitalization: `Rating` ≠ `rating`
    - [ ] Flag any case mismatches as errors

    ### 3. Intent Matching
    - [ ] Does SELECT return exactly what the question asks for?
    - [ ] If question asks for "count", is COUNT() used?
    - [ ] If question asks for specific columns, are they in SELECT?

    ### 4. Filter Accuracy
    - [ ] Are all filters from the question included?
    - [ ] Are there any hallucinated filters (values not in question)?
    - [ ] Are filter operators correct (=, >, <, LIKE, etc.)?

    ### 5. JOIN Validity (if applicable)
    - [ ] If multiple tables, are JOINs used correctly?
    - [ ] Are JOIN conditions based on proper foreign keys from schema?

    ## Scoring Rubric

    | Confidence | Criteria |
    |------------|----------|
    | 0.95-1.0 | Perfect - ALL table/column names match schema EXACTLY (case-sensitive) |
    | 0.85-0.94 | Minor issues but all names are correct |
    | 0.70-0.84 | 1-2 case mismatches (e.g., `movie` instead of `Movie`) |
    | 0.50-0.69 | Multiple case mismatches affecting query execution |
    | 0.30-0.49 | Major case mismatches - query will fail |
    | 0.0-0.29 | Completely wrong table/column names or invalid SQL |

    ## Common Case-Sensitive Errors to Catch

    ❌ **Case Mismatch Error**:
    - Schema: `Movie`, `Rating`
    - SQL: `SELECT * FROM movie WHERE rating > 3`
    - Issue: `movie` should be `Movie`, `rating` should be `Rating`
    - Score: 0.3-0.5 (query will fail)

    ❌ **Mixed Case Error**:
    - Schema: `Item`, `Category`
    - SQL: `SELECT i.name FROM item i JOIN category c ON...`
    - Issue: `item` should be `Item`, `category` should be `Category`
    - Score: 0.3-0.5 (query will fail)

    ## Output Format
    {{
      "confidence": 0.0-1.0,
      "error": false,
      "reason": "detailed explanation including any case mismatches found",
      "issues": ["list", "of", "specific", "problems", "e.g., 'table movie should be Movie'"],
      "suggestions": ["list", "of", "specific", "fixes"]
    }}

    ## Your Evaluation (JSON only, no markdown):

# Default version to use
default_version: "v2"
