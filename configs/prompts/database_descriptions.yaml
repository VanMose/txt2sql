# Database Descriptions
# These descriptions are injected into prompts to help the LLM understand the database context.
# Version: Select via settings.db_description_version
#
# DESIGN PRINCIPLES:
# - Universal descriptions that work with ANY database domain
# - No hardcoded table names (tables are auto-discovered)
# - Focus on domain/purpose, not specific data
# - Multi-language support (EN/RU)
# - Easy to extend for new databases

# =============================================================================
# FLIGHT & AVIATION DATABASES
# =============================================================================

music_1:
  name: "Music Collection Database"

  en: |
    This database stores music collection information including artists, songs,
    genres, and audio file metadata.
    
    **Purpose:**
    - Catalog music artists and their origins
    - Store song metadata with ratings and technical details
    - Organize music by genres
    - Track audio file information
    
    **Typical queries:**
    - Find songs by artist or genre
    - Get artist information by country
    - Search songs by rating or technical criteria
    

  ru: |
    Эта база данных хранит информацию о музыкальной коллекции, включая артистов,
    песни, жанры и метаданные аудиофайлов.
    
    **Назначение:**
    - Каталогизировать музыкальных артистов и их происхождение
    - Хранить метаданные песен с рейтингами и техническими деталями
    - Организовывать музыку по жанрам
    - Отслеживать информацию об аудиофайлах
    
    **Типичные запросы:**
    - Найти песни по артисту или жанру
    - Получить информацию об артисте по стране
    - Искать песни по рейтингу или техническим критериям
    

restaurants:
  name: "Restaurant Directory Database"

  en: |
    This database contains restaurant information including locations,
    cuisine types, and ratings.
    
    **Purpose:**
    - Store restaurant location data
    - Categorize restaurants by cuisine type
    - Track restaurant ratings
    
    **Typical queries:**
    - Find restaurants by location or cuisine
    - Get restaurant ratings and reviews
    - Search by geographic criteria
    

  ru: |
    Эта база данных содержит информацию о ресторанах, включая местоположения,
    типы кухни и рейтинги.
    
    **Назначение:**
    - Хранить данные о местоположении ресторанов
    - Категоризировать рестораны по типу кухни
    - Отслеживать рейтинги ресторанов
    
    **Типичные запросы:**
    - Найти рестораны по местоположению или кухне
    - Получить рейтинги и отзывы ресторанов
    - Искать по географическим критериям
    

restaurant_1:
  name: "Student Restaurant Visits Database"

  en: |
    This database tracks student restaurant visits and preferences.
    It includes student information, restaurant details, and visit records.
    
    **Purpose:**
    - Store student information and preferences
    - Maintain restaurant directory with types
    - Track visit records with spending data
    
    **Typical queries:**
    - Find student visit patterns
    - Get restaurant popularity among students
    - Analyze spending by student or restaurant
    

  ru: |
    Эта база данных отслеживает посещения студентами ресторанов и предпочтения.
    Она включает информацию о студентах, детали ресторанов и записи о посещениях.
    
    **Назначение:**
    - Хранить информацию о студентах и предпочтениях
    - Вести каталог ресторанов с типами
    - Отслеживать записи о посещениях с данными о тратах
    
    **Типичные запросы:**
    - Найти паттерны посещений студентов
    - Получить популярность ресторанов среди студентов
    - Анализировать траты по студенту или ресторану
    

orchestra:
  name: "Orchestra Performance Database"

  en: |
    This database manages orchestra performance information including conductors,
    orchestras, performances, and individual shows.
    
    **Purpose:**
    - Store conductor biographical data
    - Maintain orchestra information and history
    - Track performance events with ratings
    - Record individual show details
    
    **Typical queries:**
    - Find conductors by background or experience
    - Get orchestra performance history
    - Analyze attendance and ratings trends
    

  ru: |
    Эта база данных управляет информацией о выступлениях оркестра, включая
    дирижеров, оркестры, представления и отдельные шоу.
    
    **Назначение:**
    - Хранить биографические данные дирижеров
    - Вести информацию об оркестрах и историю
    - Отслеживать события представлений с рейтингами
    - Записывать детали отдельных шоу
    
    **Типичные запросы:**
    - Найти дирижеров по происхождению или опыту
    - Получить историю выступлений оркестра
    - Анализировать тенденции посещаемости и рейтингов
    

flight_4:
  name: "Global Aviation Database"

  en: |
    This is a comprehensive global aviation database with extensive coverage of
    airlines, airports, and flight routes worldwide.
    
    **Purpose:**
    - Maintain global registry of airlines with IATA/ICAO codes
    - Store worldwide airport database with coordinates
    - Track international flight route networks
    
    **Typical queries:**
    - Find airlines by country or code
    - Get airport information by IATA/ICAO code
    - Analyze route networks
    

  ru: |
    Это комплексная глобальная авиационная база данных с обширным охватом
    авиакомпаний, аэропортов и авиамаршрутов по всему миру.
    
    **Назначение:**
    - Вести глобальный реестр авиакомпаний с кодами IATA/ICAO
    - Хранить мировую базу аэропортов с координатами
    - Отслеживать международные сети авиамаршрутов
    
    **Типичные запросы:**
    - Найти авиакомпании по стране или коду
    - Получить информацию об аэропорте по коду IATA/ICAO
    - Анализировать сети маршрутов
    

music_4:
  name: "Music Events & Charts Database"

  en: |
    This database focuses on music festivals, artists, and chart performance.
    It tracks artist information, music festival events, and weekly chart rankings.
    
    **Purpose:**
    - Store artist biographical information
    - Track music festival events and results
    - Maintain weekly music chart rankings
    
    **Typical queries:**
    - Find artists by biographical criteria
    - Get festival information and results
    - Analyze chart performance over time
    

  ru: |
    Эта база данных фокусируется на музыкальных фестивалях, артистах и позициях в чартах.
    Она отслеживает информацию об артистах, события музыкальных фестивалей
    и еженедельные чарты песен.
    
    **Назначение:**
    - Хранить биографическую информацию об артистах
    - Отслеживать события музыкальных фестивалей и результаты
    - Вести еженедельные музыкальные чарты
    
    **Типичные запросы:**
    - Найти артистов по биографическим критериям
    - Получить информацию о фестивале и результатах
    - Анализировать позиции в чартах во времени
    

flight_2:
  name: "Airline Routes Database"

  en: |
    This database focuses on airline routes and airport information.
    It contains data about airlines, airports across different countries,
    and flight connections between airports.
    
    **Purpose:**
    - Store airline company information
    - Maintain airport database with location data
    - Track flight routes and connections
    
    **Typical queries:**
    - Find all airports in a country
    - Get routes operated by specific airline
    - Find connections between cities
    

  ru: |
    Эта база данных фокусируется на авиамаршрутах и информации об аэропортах.
    Она содержит данные об авиакомпаниях, аэропортах в разных странах
    и авиарейсах между аэропортами.
    
    **Назначение:**
    - Хранить информацию об авиакомпаниях
    - Вести базу аэропортов с данными о местоположении
    - Отслеживать авиамаршруты и соединения
    
    **Типичные запросы:**
    - Найти все аэропорты в стране
    - Получить маршруты, обслуживаемые конкретной авиакомпанией
    - Найти соединения между городами
    

flight_1:
  name: "Flight Operations Database"

  en: |
    This database contains information about airline operations including aircraft,
    employees, certifications, and flight schedules.
    
    **Purpose:**
    - Track aircraft fleet and their operational capabilities
    - Manage employee certifications and qualifications
    - Record flight schedules with pricing information
    
    **Typical queries:**
    - Find employees certified for specific aircraft
    - Get flight schedules between cities
    - Check aircraft capacity and range
    

  ru: |
    Эта база данных содержит информацию об авиаоперациях, включая воздушные суда,
    сотрудников, сертификаты и расписания рейсов.
    
    **Назначение:**
    - Отслеживать парк воздушных судов и их операционные возможности
    - Управлять сертификатами и квалификациями сотрудников
    - Записывать расписания рейсов с информацией о ценах
    
    **Типичные запросы:**
    - Найти сотрудников, сертифицированных для конкретных самолетов
    - Получить расписание рейсов между городами
    - Проверить вместимость и дальность самолетов
    

